name: R-CMD-check

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LANG: C
      LC_ALL: C
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::roxygen2
          needs: check

      - name: Verify roxygen output
        shell: Rscript {0}
        run: |
          roxygen2::roxygenise(".")
          generated <- system("git diff --name-only --exit-code", intern = FALSE, ignore.stderr = FALSE)
          if (!identical(generated, 0L)) {
            stop("Roxygen output is out of date. Run roxygen2::roxygenise('.') and commit the changes.")
          }

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual")'
