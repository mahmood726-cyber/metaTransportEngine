name: pkgdown

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pkgdown
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::roxygen2
            local::.
          needs: website

      - name: Verify roxygen output
        shell: Rscript {0}
        run: |
          roxygen2::roxygenise(".")
          generated <- system("git diff --name-only --exit-code", intern = FALSE, ignore.stderr = FALSE)
          if (!identical(generated, 0L)) {
            stop("Roxygen output is out of date. Run roxygen2::roxygenise('.') and commit the changes.")
          }

      - uses: r-lib/actions/pkgdown@v2
